<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    .container-1{
        display: flex;
        flex-wrap: wrap;
        justify-content: space-around;
    }
    .one{
        flex-basis: 100%;
        height: 200px;
        background-color: greenyellow;
        margin: 10px;
    }
    .container-2{
        display: flex;
        justify-content: space-around;
        flex-wrap: wrap;
    }
    .two{
        flex-basis: 30%;
        height: 200px;
        background-color: skyblue;
        margin: 10px;
    }
    .container-3{
        display: flex;
        justify-content: space-around;
        flex-wrap: wrap;
    }
    .three{
        flex-basis: 20%;
        height: 200px;
        background-color: gray;
        margin: 10px;
    }

    @media screen and (max-width:900px) {
        .one{
            height: 150px;
        }
        .two{
            flex-basis: 100%;
            height: 100px;
        }
        .three{
            flex-basis: 40%;
            height: 100px;
        }
    }

    @media screen and (max-width:600px) {
        .one{
            height: 100px;
        }
        .two{
            height: 150px;
        }
        .three{
            flex-basis: 100%;
        }
    }

</style>

<div>
    <div class="container-1">
        <div class="one"></div>
    </div>
    <div class="container-2">
        <div class="two"></div>
        <div class="two"></div>
        <div class="two"></div>
    </div>
    <div class="container-3">
        <div class="three"></div>
        <div class="three"></div>
        <div class="three"></div>
        <div class="three"></div>
    </div>
</div>
